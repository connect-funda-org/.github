name: "✅ Task"
description: "A specific piece of work."
type: "Task"
title: "✅ Task: "
labels: ["task", "triage"]
body:
  - type: input
    id: parent-feature
    attributes:
      label: "Parent Feature"
      placeholder: "e.g., #123"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: "Scope of Work"
      description: "Detailed explanation of what needs to be coded, designed, or resolved."
    validations:
      required: true
  - type: textarea
    id: technical
    attributes:
      label: "Technical Details / Assumptions"
      description: "Any relevant business rules, edge cases, or dependencies."
  - type: input
    id: estimated-effort
    attributes:
      label: "Estimated Effort"
      placeholder: "e.g., 2-4 hours / 1 day"
    validations:
      required: true
  - type: textarea
    id: definition-of-done
    attributes:
      label: "Definition of Done"
      value: "- [ ] Code written and reviewed\n- [ ] Tested locally\n- [ ] Merged into main"
    validations:
      required: true

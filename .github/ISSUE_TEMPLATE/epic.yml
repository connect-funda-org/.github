name: "🎯 Epic"
description: "Epic issue with features."
type: "Epic"
title: "🎯 Epic: "
labels: ["epic", "triage"]
body:
  - type: textarea
    id: user-story
    attributes:
      label: "User Story"
      placeholder: "As a [persona]\nI want to [action]\nSo that [benefit]"
    validations:
      required: true
  - type: textarea
    id: business-value
    attributes:
      label: "Business Value / Context"
      description: "Why is this important? What is the impact on the product or user?"
    validations:
      required: true
  - type: textarea
    id: feature-list
    attributes:
      label: "Feature List"
      placeholder: "- [ ] Feature 1\n- [ ] Feature 2"
    validations:
      required: true
  - type: input
    id: target-release
    attributes:
      label: "Target Release / Milestone"
      placeholder: "e.g., Q3 2026 Release"

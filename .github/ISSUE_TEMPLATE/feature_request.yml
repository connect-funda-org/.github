name: "🚀 Feature"
description: "A request, idea, or new functionality."
type: "Feature"
title: "🚀 Feature: "
labels: ["feature", "triage"]
body:
  - type: textarea
    id: user-story
    attributes:
      label: "User Story"
      placeholder: "As a [persona]\nI want to [action]\nSo that [benefit]"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "Description of Problem"
      description: "What problem does this feature address?"
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: "Proposed Solution"
      description: "How do we intend to solve it?"
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      placeholder: "- [ ] Condition of satisfaction 1\n- [ ] Condition of satisfaction 2"
    validations:
      required: true
  - type: textarea
    id: task-breakdown
    attributes:
      label: "Suggested Task Breakdown"
      placeholder: "- [ ] Task 1\n- [ ] Task 2"
  - type: input
    id: estimated-effort
    attributes:
      label: "Estimated Effort"
      placeholder: "e.g., 2 days / 1 week"
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - P0 – Critical
        - P1 – High
        - P2 – Medium
        - P3 – Low
    validations:
      required: true
